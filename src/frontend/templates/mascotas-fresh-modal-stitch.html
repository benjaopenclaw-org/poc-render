<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "terracotta": "#ec5b13",
                        "sand": "#f1ede9",
                        "olive-muted": "#8d9178"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<!-- Backdrop / Dashboard Dimmed State -->
<div class="fixed inset-0 bg-[#141414]/60 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
<!-- Modal Container -->
<div class="bg-background-light dark:bg-background-dark w-full max-w-2xl rounded-t-xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden max-h-[95vh]">
<!-- BottomSheetHandle for mobile feel -->
<div class="sm:hidden flex h-6 w-full items-center justify-center shrink-0">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Header -->
<div class="px-6 py-4 flex items-center justify-between border-b border-primary/10">
<div class="flex-1">
<h1 class="serif-title text-2xl font-bold text-slate-900 dark:text-slate-100">Nueva Mascota</h1>
<p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 font-display">Completa los detalles para comenzar el seguimiento de su cuidado.</p>
</div>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="flex-1 overflow-y-auto p-6">
<div class="grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Left Column: Photo Upload -->
<div class="md:col-span-4 flex flex-col items-center gap-4">
<div class="relative group cursor-pointer">
<div class="size-40 sm:size-48 rounded-full border-2 border-dashed border-olive-muted flex flex-col items-center justify-center bg-sand/30 dark:bg-primary/5 hover:bg-sand/50 transition-all overflow-hidden">
<div class="bg-center bg-no-repeat bg-cover absolute inset-2 rounded-full opacity-20" data-alt="Soft outline of a generic pet profile" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDb0wgHousMUCWJnjMA_7nFaNQjankmJMfHHNvvTrNdwAUBYrLZIrZ88xqqgDilrp66zldlawySbUOWAbcaZiKAafje2AFjjDKeRPnVDTRAMElR33-UPc3EefXfRk-nQc159fvYI_Ny73Rs66hEzvjSWAKvnenJwJ4FRcexSTV0cSS3A9ZYlKnTwSoV6C4mbfp42jkLBnjCDiqDejPe_1rCq0edRvpK_2gUTp3fO835CYDTY_P4HGUk8wWBmWLrgtOtoq6IOWXtXzfa')">
</div>
<span class="material-symbols-outlined text-4xl text-olive-muted mb-2">add_a_photo</span>
<p class="text-xs font-bold text-olive-muted uppercase tracking-widest">Subir Foto</p>
</div>
</div>
<p class="text-[10px] text-center text-slate-400 uppercase tracking-tighter">Formatos: JPG, PNG • Máx 5MB</p>
</div>
<!-- Right Column: Form Fields -->
<div class="md:col-span-8 space-y-5">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="sm:col-span-2">
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Nombre</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5" placeholder="Ej. Luna" type="text"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Especie</label>
<select class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5">
<option>Perro</option>
<option>Gato</option>
<option>Ave</option>
<option>Otro</option>
</select>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Raza</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5" placeholder="Ej. Golden Retriever" type="text"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Edad (Años)</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5" placeholder="2" type="number"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Peso (kg)</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5" placeholder="12.5" type="text"/>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-2 uppercase tracking-wide">Estado de Salud</label>
<div class="flex p-1 bg-sand dark:bg-slate-800 rounded-lg">
<button class="flex-1 py-2 text-sm font-medium rounded-md bg-white dark:bg-primary shadow-sm text-primary dark:text-white">Saludable</button>
<button class="flex-1 py-2 text-sm font-medium text-slate-600 dark:text-slate-400">En tratamiento</button>
<button class="flex-1 py-2 text-sm font-medium text-slate-600 dark:text-slate-400">Revisión</button>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Próxima Vacuna</label>
<div class="relative">
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5" type="date"/>
</div>
</div>
</div>
<!-- Bottom Section: Additional Notes -->
<div class="md:col-span-12">
<label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 uppercase tracking-wide">Notas Adicionales</label>
<textarea class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 px-4 py-2.5 resize-none" placeholder="Alergias, comportamiento, o indicaciones especiales..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Footer -->
<div class="p-6 bg-slate-50 dark:bg-slate-900/50 flex flex-col-reverse sm:flex-row gap-3 border-t border-primary/5">
<button class="flex-1 sm:flex-none px-8 py-3 bg-sand hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-lg transition-colors order-2 sm:order-1">
                    Cancelar
                </button>
<button class="flex-1 px-8 py-3 bg-terracotta hover:bg-terracotta/90 text-white font-bold rounded-lg shadow-lg shadow-terracotta/20 transition-all order-1 sm:order-2">
                    Guardar Mascota
                </button>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d442",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Background Content (Simulating the Listado tab) -->
<div class="fixed inset-0 overflow-hidden blur-sm opacity-40 pointer-events-none">
<div class="p-4 space-y-4">
<div class="flex justify-between items-center">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Mis Mascotas</h1>
<div class="bg-primary size-10 rounded-full"></div>
</div>
<div class="space-y-3">
<div class="h-24 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-4 flex items-center gap-4">
<div class="size-16 bg-slate-200 rounded-lg"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-1/3 bg-slate-200 rounded"></div>
<div class="h-3 w-1/4 bg-slate-100 rounded"></div>
</div>
</div>
<div class="h-24 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-4 flex items-center gap-4">
<div class="size-16 bg-slate-200 rounded-lg"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-1/3 bg-slate-200 rounded"></div>
<div class="h-3 w-1/4 bg-slate-100 rounded"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Backdrop Dimmer -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] z-40"></div>
<!-- Modal Container -->
<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
<div class="bg-background-light dark:bg-slate-900 w-full max-w-lg h-[92vh] sm:h-auto sm:max-h-[85vh] rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col">
<!-- TopAppBar / Header -->
<div class="flex items-center px-4 py-4 border-b border-slate-200 dark:border-slate-800">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold flex-1 text-center">Añadir Mascota</h2>
<button class="text-primary text-base font-bold px-2 py-1">Guardar</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-4 pb-10 space-y-6 pt-4">
<!-- Section: Identity -->
<div>
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-4">Datos de Identidad</h3>
<div class="space-y-4">
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Nombre</span>
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="Ej: Max" type="text"/>
</label>
<div class="grid grid-cols-2 gap-4">
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Especie</span>
<select class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100">
<option>Seleccionar</option>
<option>Perro</option>
<option>Gato</option>
<option>Ave</option>
</select>
</label>
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Edad</span>
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" placeholder="Años" type="number"/>
</label>
</div>
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Raza</span>
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="Ej: Golden Retriever" type="text"/>
</label>
</div>
</div>
<!-- Section: Health -->
<div class="pt-4 border-t border-slate-100 dark:border-slate-800">
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">health_and_safety</span> Salud
                    </h3>
<div class="space-y-4">
<div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-medium">Vacunación al día</span>
<span class="text-xs text-slate-500">¿Tiene todas las vacunas anuales?</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Último chequeo</span>
<div class="relative">
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 pl-11" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">calendar_today</span>
</div>
</label>
</div>
</div>
<!-- Section: Notes -->
<div class="pt-4 border-t border-slate-100 dark:border-slate-800">
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-4">Notas</h3>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400 p-4" placeholder="Alergias, dieta especial o comportamiento..." rows="3"></textarea>
</div>
</div>
<!-- Action Buttons Footer -->
<div class="p-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex gap-3">
<button class="flex-1 h-14 rounded-xl text-slate-700 dark:text-slate-300 font-bold bg-slate-100 dark:bg-slate-800">Cancelar</button>
<button class="flex-[2] h-14 rounded-xl text-white font-bold bg-primary shadow-lg shadow-primary/20">Guardar Cambios</button>
</div>
</div>
</div>
</body></html>
